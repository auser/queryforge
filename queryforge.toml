[database]
backend = "libsql"
url = "file:queryforge-example.db"

[codegen]
out_dir = "src/db"
execution_target = "libsql-native"
query_dir = "queries"

[schema]
files = ["schema.sql"]

[migrations]
paths = []

[build]
default_output = "out-dir"
offline = "auto"
watch = [
  "queryforge.toml",
  "queries",
  "schema.sql"
]

[inference]
unknown_expression_policy = "error"
