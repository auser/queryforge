[database]
backend = "postgres"
url = "postgres://postgres:postgres@127.0.0.1:55432/queryforge"

[codegen]
out_dir = "src/db"
execution_target = "sqlx-postgres"
query_dir = "queries"

[schema]
files = ["schema.sql"]

[migrations]
paths = []

[build]
default_output = "out-dir"
offline = "auto"
watch = [
  "queryforge.toml",
  "schema.sql",
  "queries",
]

[inference]
unknown_expression_policy = "error"
